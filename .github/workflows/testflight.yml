name: TestFlight

# Builds the iOS app (including the Go/tsnet xcframework) and uploads it to
# TestFlight, signed with Apple cloud-managed certificates via an App Store
# Connect API key. No fastlane match / certificate repo required.
#
# Required repository secrets:
#   ASC_KEY_ID      - App Store Connect API key ID
#   ASC_ISSUER_ID   - App Store Connect issuer ID
#   ASC_KEY_P8      - base64 of the .p8 private key file
#                     (create the key at App Store Connect > Users and Access
#                      > Integrations, role: App Manager)
#
# Prerequisite (one time): an app record in App Store Connect with bundle ID
# com.stephenspeicher.tailarr.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  APPLE_TEAM_ID: 857ZZSY5ZQ
  FLUTTER_VERSION: 3.38.6

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: lunasea/Go/go.sum

      - name: Build GoLunaSea.xcframework
        working-directory: lunasea/Go
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile bind -target ios -o GoLunaSea.xcframework .
          rm -rf ../ios/GoLunaSea.xcframework
          cp -R GoLunaSea.xcframework ../ios/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter dependencies
        working-directory: lunasea
        run: flutter pub get

      - name: Pod install
        working-directory: lunasea/ios
        run: pod install

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_KEY_P8" | base64 -d > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Flutter build (no codesign)
        working-directory: lunasea
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Archive
        working-directory: lunasea/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

      - name: Export & upload to TestFlight
        working-directory: lunasea/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild \
            -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
